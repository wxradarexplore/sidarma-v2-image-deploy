services:
  api:
    image: ghcr.io/wxradarexplore/sidarma-api:${SIDARMA_API_IMAGE_TAG:-20260504}
    container_name: sidarma-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT}
      MONGO_DB: ${MONGO_DB}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      NODE_ID: ${NODE_ID}
      NODE_NAME: ${NODE_NAME}
      NODE_LABEL: ${NODE_LABEL}
      NODE_HOSTNAME: ${NODE_HOSTNAME}
      NODE_ALIASES: ${NODE_ALIASES}
      NODE_ROLES: ${NODE_ROLES}
      CLUSTER_API_LOCAL_URL: ${CLUSTER_API_LOCAL_URL}
      CLUSTER_PEERS_JSON: ${CLUSTER_PEERS_JSON}
      WEB_API_SHARED_TOKEN: ${WEB_API_SHARED_TOKEN}
      CLUSTER_NODE_ADMIN_ROLES: ${CLUSTER_NODE_ADMIN_ROLES}
      LOG_API_PATH: ${LOG_API_PATH}
    volumes:
      - ./logs:/var/log/sidarma

  worker:
    image: ghcr.io/wxradarexplore/sidarma-worker:${SIDARMA_WORKER_IMAGE_TAG:-20260504rev01}
    restart: unless-stopped
    environment:
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT}
      MONGO_DB: ${MONGO_DB}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      NODE_ID: ${NODE_ID}
      NODE_NAME: ${NODE_NAME}
      NODE_LABEL: ${NODE_LABEL}
      NODE_HOSTNAME: ${NODE_HOSTNAME}
      NODE_ALIASES: ${NODE_ALIASES}
      NODE_ROLES: ${NODE_ROLES}
      LOG_WORKER_PATH: ${LOG_WORKER_PATH}
      MINIO_UPLOAD_ENABLED: ${MINIO_UPLOAD_ENABLED}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SECURE: ${MINIO_SECURE}
      NODE_REGISTRY_CACHE_TTL_SECONDS: ${NODE_REGISTRY_CACHE_TTL_SECONDS:-5}
      WORKER_IDLE_CUTOFF_SECONDS: ${WORKER_IDLE_CUTOFF_SECONDS:-90}
    volumes:
      - ./config:/app/config:ro
      - ./runtime:/data
      - ./logs:/var/log/sidarma
      - ${RAINBOW_STAGING_PATH}:/rainbow-staging
      - ${RAINBOW_IMPORT_PATH}:/rainbow-import
      - ${RAINBOW_RB5INPUT_PATH}:/rainbow-rb5input
      - ${RAINBOW_ONLINE_PATH}:/rainbow-online
      - ${RAINBOW_RAWDATA_PATH}:/rainbow-rawdata
    depends_on:
      - api

  scheduler:
    image: ghcr.io/wxradarexplore/sidarma-scheduler:${SIDARMA_SCHEDULER_IMAGE_TAG:-20260503}
    container_name: sidarma-scheduler
    restart: unless-stopped
    environment:
      API_BASE: http://api:8000
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT}
      MONGO_DB: ${MONGO_DB}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      NODE_ID: ${NODE_ID}
      NODE_NAME: ${NODE_NAME}
      NODE_LABEL: ${NODE_LABEL}
      NODE_HOSTNAME: ${NODE_HOSTNAME}
      NODE_ALIASES: ${NODE_ALIASES}
      NODE_ROLES: ${NODE_ROLES}
      SCHEDULER_IDENTITY: ${SCHEDULER_IDENTITY}
      LOG_SCHEDULER_PATH: ${LOG_SCHEDULER_PATH}
    volumes:
      - ./schedule:/app/schedule:ro
      - ./logs:/var/log/sidarma
    depends_on:
      - api
